<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flash ATM สมัครสมาชิก</title>
<style>
body{
font-family:sans-serif;
text-align:center;
background:#111;
color:white;
}
.box{
background:#222;
padding:30px;
margin:40px auto;
width:300px;
border-radius:10px;
}
input{
width:90%;
padding:10px;
margin:10px;
}
button{
padding:12px 20px;
background:red;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="box">

<h2>สมัครสมาชิก Flash ATM</h2>

<input placeholder="ชื่อ"><br>
<input placeholder="เบอร์โทร"><br>
<input type="file"><br>

<button onclick="register()">สมัครสมาชิก</button>

</div>

<script>

async function register(){

const url="https://script.google.com/macros/s/AKfycbxQ_EQJ8JzILBRV5UBVuF68HvD2BUj598WGyes5S6clpZwCxXn7KzzyyJkKbmoxxdBl/exec";

const data={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
lineid:"",
contactname:"",
contactphone:"",
idcard:""
};

await fetch(url,{
method:"POST",
body:JSON.stringify(data)
});

alert("สมัครสมาชิกสำเร็จ");

}

</script>
  
</body>
</html>
